<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Login Form</h1>
    <form>
        <label for="email">
          email:
          <input placeholder="text" name="email">
        </label>

        <label for="password">
          password:
          <input placeholder="enter your password" name="password">
        </label>

        <button type="reset">reset</button>
    </form>

    <h2>Learning Form</h2>
    <form>
        <label for="email">
          email:
          <textarea rows="5" column="5" name="email" id=""></textarea>
        </label>
        <button type="submit">Submit</button>
    </form> 

    <h3>Form For Games</h3>
    <form>
        <label for="football">
          football:
          <input type="checkbox">
        </label>

        <label for="besketball">
           basketball:
           <input type="radio">
        </label>

        <label for="cricket">
            cricket:
            <input type="checkbox">
        </label>
        <label for="games">
            <select name="games" id="">
                <option value="cricket">cricket</option>
                <option value="baseball">baseball</option>
            </select>
        </label>

        <label for="month">
            month:
            <input type="month" name="" id="">
        </label>

        <label for="color">
            color:
            <input type="color" name="" id="">
        </label>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
