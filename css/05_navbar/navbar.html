<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar Variations</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            margin: 0px;
            padding: 20px;
            background-color: #f0f0f0;
            color: #333;
        }
        .nav-container{
            margin-bottom: 40px;
        }
        h2{
            margin-bottom: 20px;
        }
        .nav1{
            background-color: bisque;
            padding: 10px;
        }
        .nav1 ul{
            list-style-type: none;
            margin: 0%;
            padding: 0%;
            display: flex;
            justify-content: space-between;
        }
        .nav1 li{
            display: inline;
        }
        .nav1 a{
            text-decoration: none;
            color: #e13c3c;
            padding: 10px 15px;
            position: relative;
        }
        .nav1 .login-btn {
            background-color: #e13c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        .nav1 a::after {
            content: 'abc';
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: 0%;
            left: 0%; 
            background-color: #e13c3c;
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .nav1 a:hover::after {
            transform: scaleX(1);
        }

        .nav2 {
            background-color: rgb(73, 125, 220);
            padding: 10px;
            width: 200px;
        }
        .nav2 ul{
            list-style-type: none;
            margin: 0%;
            padding: 0%;
        }
        .nav2 li {
            margin-bottom: 12px;
        }
        .nav2 a {
            text-decoration: none;
            color: snow;
            display: block;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .nav2 a:hover {
            background-color: rgb(34, 105, 237);
        }
        .nav2 .login-btn {
            background-color: rgb(32, 103, 235);
            color: white;
            border: none;   
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        .nav2 .login-btn:hover {
            background-color: rgb(8, 52, 134);
            border: 1px solid white;
        }

        .nav3 {
            background-color: rgb(122, 199, 122);
            padding:0%;
        }
        .nav3 ul {
            list style-type: none;
            padding: 0px;
            margin: 0px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav3 a {
            text-decoration: none;
            color: #ea1a1a;
            padding: 10px 15px;
            display:block;
        }
        .nav3 .dropdown-content{
            display: none;
        }
        .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position: absolute;
            background-color: rgb(102, 199, 181);
            min-width: 160px;
        }
    </style>
</head>
<body>
    <div class=""nav-container>
        <h2>Varaition 1: Horizontal with underline effect</h2>
        <nav class="nav1">
         <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Product</a></li>
            <li><button class="login-btn">Login</button></li>
         </ul>
        </nav>
    </div>

    <div class="nav-container">
        <h2>Variation 2: Vertical with hover effect</h2>
        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Product</a></li>
                <br>
                <li><button class="login-btn">Login</button></li>
            </ul>
            </nav>
    </div>
            
            <div class="nav container">
            <h2>Variation 3: Horizontal with dropdown</h2>
            <nav class="nav3">
         <ul>
            <li><a href="#">Home</a></li>
            <li class="dropdown">
                <a href="#">About </a>
                <div class="dropdown-content">
                    <a href="#">Our story</a>
                    <a href="#">Team</a>
                    <a href="#">Contact</a>
                </div>
            </li>
            <li><a href="#">Product</a></li>
            <li><button class="login-btn">Login</button></li>
         </ul>
        </nav>
    </div>
</body>
</html>
