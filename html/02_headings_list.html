<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <h1>Lorem ipsum dolor sit.</h1>
    <h2>Lorem <em>ipsum</em> dolor sit amet consectetur adipisicing.</h2>
    <p>Lorem ipsum <b>dolor</b> sit amet <strong>consectetur</strong> adipisicing.</p>

    <ul>
        <li>orange tea</li>
        <li>green tea</li>
    </ul>
    
    <img src="images/fountain.jpg" alt="" height="300px">

    <h1>Block level elements</h1>
    <div>
    <ul>
        <li>heading h1 to h6</li>
        <li>ol, li</li>
        <li>li</li>
        <li>p</li>
    </ul>
    </div>

    <div>
        <h1>Inline elements</h1>
        <ul>
            <li>a tags</li>
            <li>img</li>
            <li>strong</li>
            <li>em</li>
        </ul>
    </div>

</body>
</html>
