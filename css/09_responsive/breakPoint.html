<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #080808;
        }
        .responsive-div {
            max-width: 600px;
            width: 100%;
            height: 50px;
            background-color: blueviolet;
            color: whitesmoke;
            font-size: 20px;
            padding: 20px;
            margin: 10px;
        }
        @media (max-width: 600px) {
            body {
                display: flex;
                align-items: flex-start;
            }
            .responsive-div {
                background-color: rgb(238, 163, 155);
            }
        }
        @media (max-width: 60px) and (max-width: 400px) {
            body {
                display: flex;
                align-items: flex-start;
            }
            .responsive-div {
                background-color: rgb(238, 163, 155);
            }
        }
    </style>
</head>
<body>
    <div class="responsive-div">
        this div changes the color based on the screen size

    </div>
</body>
</html>
