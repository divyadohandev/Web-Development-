<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5dada;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: #e08d8d;
            border-radius: 20px;
            padding: 20px;
            width: 350px;
        }
        h2{
            color: floralwhite;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        form{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        input{
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background-color: bisque;
        }
        button{
            background-color: honeydew;
            color:rgb(75, 132, 239);
            border-radius: 20px;
            padding: 20px;
            font-size: 16px;
        }
        button:hover{
            background-color: rgb(165, 193, 193);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login Page</h2>
        <form>
            <input type="text" id="email" placeholder="email">
            <input type="password" id="password" placeholder="password">
            <button type="submit">Login</button>
            
        </form>
    </div>
</body>
</html>
